<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク一覧</title>

<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/tasks/list.css}">
</head>

<body>
	
<div class="page-wrap">

    <div class="header-area">
        <h1>タスク一覧</h1>
		<a th:href="@{/tasks/form-new}" class="add-btn">
			＋ 新規追加
		</a>
    </div>

    <!-- 0件時 -->
    <div th:if="${#lists.isEmpty(taskList)}" class="empty-box">
        現在タスクは登録されていません。「新規追加」から追加してください。
    </div>

    <!-- 1件以上 -->
    <div th:if="${!#lists.isEmpty(taskList)}" class="table-wrap">

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>タイトル</th>
                    <th>内容</th>
                    <th>登録者</th>
                    <th>開始日</th>
                    <th>終了日</th>
                    <th>作成日時</th>
                    <th>更新日時</th>
                    <th>操作</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="task : ${taskList}">
                    <td th:text="${task.id}"></td>
                    <td th:text="${task.title}"></td>
                    <td th:text="${task.content}"></td>
                    <td th:text="${task.userName}"></td>
                    <td th:text="${task.startDate}"></td>
                    <td th:text="${task.endDate}"></td>

                    <td th:text="${#temporals.format(task.createdAt,'yyyy/MM/dd HH:mm')}"></td>
                    <td th:text="${#temporals.format(task.updatedAt,'yyyy/MM/dd HH:mm')}"></td>

                    <td class="action-cell">

                        <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="edit-btn">
                            編集
                        </a>

                        <form th:action="@{/tasks/delete/{id}(id=${task.id})}"
                              method="post"
                              style="display:inline-block;"
                              onsubmit="return confirm('削除しますか？');">

                            <button type="submit" class="delete-btn">
                                削除
                            </button>

                        </form>

                    </td>
                </tr>
            </tbody>

        </table>

        <div class="paging">

            <a th:if="${currentPage > 1}"
               th:href="@{/tasks(page=${currentPage - 1})}">
                前へ
            </a>

            <span th:each="i : ${#numbers.sequence(1, totalPage)}">

                <a th:if="${i != currentPage}"
                   th:href="@{/tasks(page=${i})}"
                   th:text="${i}">
                </a>

                <strong th:if="${i == currentPage}"
                        th:text="${i}">
                </strong>

            </span>

            <a th:if="${currentPage < totalPage}"
               th:href="@{/tasks(page=${currentPage + 1})}">
                次へ
            </a>

        </div>

    </div>
	

</div>

</body>
</html>
