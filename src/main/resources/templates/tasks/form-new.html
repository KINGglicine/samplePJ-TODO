<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>新規タスク追加</title>

<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/tasks/form.css}">
</head>

<body>

<div class="container">

    <h1>タスク追加</h1>

    <form th:action="@{/tasks/create}" method="post">

        <p>タイトル</p>
        <input type="text" name="title" placeholder="買い物リスト作成" required>

        <p>内容</p>
        <textarea name="content" rows="5"
                  placeholder="週末の買い物リストを作成"></textarea>

        <p>登録者</p>
        <input type="text" name="userName" placeholder="田中 太郎">

        <p>開始日</p>
        <input type="date" name="startDate">

        <p>終了日</p>
        <input type="date" name="endDate">

        <div class="btn-group">

            <button type="submit" class="new">
                登録
            </button>

            <a th:href="@{/tasks}" class="cancel">
                ← キャンセル
            </a>

        </div>

    </form>

</div>

</body>
</html>
