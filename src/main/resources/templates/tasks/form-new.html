<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>新規タスク追加</title>

<link rel="stylesheet"
      th:href="@{/css/common.css}">

<link rel="stylesheet"
      th:href="@{/css/tasks/form.css}">
</head>

<body>

<div class="container">

    <h1>タスク追加</h1>

    <form th:action="@{/tasks/create}"
          th:object="${task}"
          method="post">

        <!-- タイトル -->
        <p>タイトル</p>

        <input type="text"
               th:field="*{title}"
               placeholder="買い物リスト作成">

        <!-- タイトルエラー -->
        <p class="error-msg"
           th:if="${#fields.hasErrors('title')}"
           th:errors="*{title}">
        </p>

        <!-- 内容 -->
        <p>内容</p>

        <textarea th:field="*{content}"
                  rows="5"
                  placeholder="週末の買い物リストを作成">
        </textarea>

        <!-- 内容エラー -->
        <p class="error-msg"
           th:if="${#fields.hasErrors('content')}"
           th:errors="*{content}">
        </p>

        <!-- 担当者 -->
        <p>担当者</p>

        <input type="text"
               th:field="*{name}"
               placeholder="田中 太郎">

        <!-- 担当者エラー -->
        <p class="error-msg"
           th:if="${#fields.hasErrors('name')}"
           th:errors="*{name}">
        </p>

        <!-- 開始日 -->
        <p>開始日</p>

        <input type="date"
               th:field="*{startDate}">

        <!-- 終了日 -->
        <p>終了日</p>

        <input type="date"
               th:field="*{endDate}">

        <div class="btn-group">

            <button type="submit"
                    class="new">

                登録

            </button>

            <a th:href="@{/tasks}"
               class="cancel">

                ← キャンセル

            </a>

        </div>

    </form>

</div>

</body>
</html>
