<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>タスク編集</title>

<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/tasks/form.css}">
</head>

<body>

<div class="container">

    <h1>タスク編集</h1>

    <form th:action="@{/tasks/update}" method="post">

        <input type="hidden" name="id" th:value="${task.id}">

        <p>タイトル</p>
        <input type="text" name="title" th:value="${task.title}" required>

        <p>内容</p>
        <textarea name="content" rows="5"
                  th:text="${task.content}"></textarea>

        <p>登録者</p>
        <input type="text" name="userName" th:value="${task.userName}">

        <p>開始日</p>
        <input type="date" name="startDate"
               th:value="${task.startDate}">

        <p>終了日</p>
        <input type="date" name="endDate"
               th:value="${task.endDate}">

        <div class="btn-group">

            <button type="submit" class="edit">
                更新
            </button>

            <a th:href="@{/tasks}" class="cancel">
                ← キャンセル
            </a>

        </div>

    </form>

</div>

</body>
</html>
